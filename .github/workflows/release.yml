name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). If empty, uses the current commit."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: macos-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Validate tag format
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Tag must match vX.Y.Z format, got: $TAG"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Signing + notarization uses the same Apple Developer identity as the
      # indigo-nx Electron app. Secret-name mapping:
      #
      #   indigo-nx (CSC_LINK, CSC_KEY_PASSWORD, APPLE_ID, APPLE_ID_PASSWORD,
      #              ASC_PROVIDER)
      #   → hq-sync (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID,
      #              APPLE_PASSWORD, APPLE_TEAM_ID)
      #
      # tauri-action reads these env vars natively:
      #   - APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD — imports the .p12
      #     into a temporary keychain automatically; no manual `security
      #     import` step needed.
      #   - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID — notarytool submits
      #     the signed bundle to Apple using an app-specific password
      #     (same method electron-builder uses on indigo-nx).
      - name: Build, sign, and notarize universal DMG
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "Developer ID Application"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater bundle signing. The public half of this keypair
          # lives in tauri.conf.json → plugins.updater.pubkey. Users get
          # auto-updates only if the .tar.gz's detached signature verifies
          # against that pubkey, so losing these secrets means shipping a
          # new pubkey + forcing every user to manually reinstall.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # build.rs reads this via env!("SENTRY_DSN") — must be present at compile time
          # so the signed binary has a wired DSN rather than the empty-string no-op path.
          HQ_SYNC_SENTRY_DSN: ${{ secrets.HQ_SYNC_SENTRY_DSN }}
          # Webview (Svelte) Sentry integration. VITE_SENTRY_DSN is inlined by Vite at
          # build time; the other three vars are consumed by @sentry/vite-plugin to
          # upload source maps and create the release during `vite build`.
          VITE_SENTRY_DSN: ${{ secrets.VITE_HQ_SYNC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: indigo-d0
          SENTRY_PROJECT: hq-sync-web
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "HQ Sync ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "See the [changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      - name: Create Sentry release and upload Rust debug symbols
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          INSTALL_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$INSTALL_DIR"
          curl -sL "https://sentry.io/get-cli/" | INSTALL_DIR="$INSTALL_DIR" INSTALL_VERSION=2.41.1 sh
          export PATH="$INSTALL_DIR:$PATH"

          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          RELEASE="hq-sync@${VERSION}"

          UPLOADED=0
          for TARGET_DIR in \
            src-tauri/target/universal-apple-darwin \
            src-tauri/target/aarch64-apple-darwin \
            src-tauri/target/x86_64-apple-darwin; do
            if [ -d "$TARGET_DIR" ]; then
              while read -r dsym; do
                sentry-cli debug-files upload \
                  --org indigo-d0 --project hq-sync \
                  --include-sources --wait "$dsym"
                UPLOADED=$((UPLOADED + 1))
              done < <(find "$TARGET_DIR" -name "*.dSYM" -type d)
            fi
          done
          if [ "$UPLOADED" -eq 0 ]; then
            echo "::error::No .dSYM bundles found in any target tree — symbolication will be broken"
            exit 1
          fi
          echo "Uploaded $UPLOADED dSYM bundle(s)"

          sentry-cli releases new "$RELEASE" --org indigo-d0 --project hq-sync
          sentry-cli releases set-commits "$RELEASE" --auto --org indigo-d0 --project hq-sync
          sentry-cli releases finalize "$RELEASE" --org indigo-d0 --project hq-sync

      # Tauri-action produces a DMG by default; this step builds a styled
      # one (custom background, window geometry) and uploads it, overriding
      # the default.
      - name: Create styled DMG
        run: |
          APP_PATH=$(find src-tauri/target/universal-apple-darwin/release/bundle -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::Could not find .app bundle"
            exit 1
          fi
          echo "Found app at: $APP_PATH"

          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          DMG_PATH="src-tauri/target/HQ-Sync_${VERSION}_universal.dmg"

          chmod +x scripts/create-dmg.sh
          ./scripts/create-dmg.sh "$APP_PATH" "$DMG_PATH"

      # tauri-action uploaded its own default DMG named "HQ.Sync_*.dmg" (dot
      # in the product name). Our styled DMG uses "HQ-Sync_*.dmg" (dash).
      # Ship only one — delete the tauri-action default before uploading
      # the styled one. hq-installer picks "the first .dmg asset" and the
      # release would otherwise end up with both.
      - name: Remove tauri-action default DMG from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DEFAULT_DMG="HQ.Sync_${VERSION}_universal.dmg"
          if gh release view "$TAG" --json assets -q '.assets[].name' | grep -Fxq "$DEFAULT_DMG"; then
            echo "Deleting default DMG: $DEFAULT_DMG"
            gh release delete-asset "$TAG" "$DEFAULT_DMG" --yes
          else
            echo "Default DMG not present — nothing to delete"
          fi

      - name: Upload styled DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DMG_PATH=$(find src-tauri/target -maxdepth 1 -name "HQ-Sync_*.dmg" | head -1)
          if [ -n "$DMG_PATH" ]; then
            gh release upload "$TAG" "$DMG_PATH" --clobber
          fi

      # Versionless DMG alias. Uploading a second copy of the styled DMG
      # under a stable filename gives us a permanent one-click URL:
      #   https://github.com/indigoai-us/hq-sync/releases/latest/download/HQ-Sync_universal.dmg
      # GitHub auto-redirects /releases/latest/download/<name> to whatever
      # is current. Consumers (hq-installer "Download manually" button, the
      # hq-onboarding flow's future sibling alias) can hardcode this URL and
      # never have to hit the API to discover the latest version.
      - name: Upload versionless DMG alias
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          DMG_PATH=$(find src-tauri/target -maxdepth 1 -name "HQ-Sync_*.dmg" | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "::warning::No styled DMG found — skipping versionless alias"
            exit 0
          fi
          ALIAS_PATH="src-tauri/target/HQ-Sync_universal.dmg"
          cp "$DMG_PATH" "$ALIAS_PATH"
          gh release upload "$TAG" "$ALIAS_PATH" --clobber

      # Auto-updater manifest. tauri-action already produces the .tar.gz
      # + .tar.gz.sig; here we translate those into the latest.json shape
      # Tauri's updater plugin polls at the endpoint in tauri.conf.json.
      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          UPDATER_BUNDLE=$(find src-tauri/target/universal-apple-darwin/release/bundle -name "*.tar.gz" | head -1)
          if [ -z "$UPDATER_BUNDLE" ]; then
            echo "::warning::No updater bundle found — skipping latest.json"
            exit 0
          fi

          if [ ! -f "${UPDATER_BUNDLE}.sig" ]; then
            echo "::error::Updater signature file missing: ${UPDATER_BUNDLE}.sig"
            exit 1
          fi
          SIGNATURE=$(cat "${UPDATER_BUNDLE}.sig")

          # tauri-action renames the uploaded .tar.gz (e.g. local
          # "HQ Sync.app.tar.gz" becomes "HQ.Sync_universal.app.tar.gz" on the
          # release). basename of the local path produced a URL with a space
          # that 404'd — v0.1.1's latest.json pointed at a nonexistent asset.
          # Query the real asset name from the release after tauri-action.
          UPLOADED_NAME=$(gh release view "$TAG" --json assets -q '.assets[] | select(.name | endswith(".tar.gz")) | .name' | head -1)
          if [ -z "$UPLOADED_NAME" ]; then
            echo "::error::Could not find uploaded .tar.gz asset on release $TAG"
            exit 1
          fi
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${UPLOADED_NAME}"
          NOTES_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          python3 -c "
          import json, sys
          data = {
            'version': sys.argv[1],
            'notes': 'See ' + sys.argv[2],
            'pub_date': sys.argv[3],
            'platforms': {
              'darwin-universal': {'signature': sys.argv[4], 'url': sys.argv[5]},
              'darwin-aarch64':  {'signature': sys.argv[4], 'url': sys.argv[5]},
              'darwin-x86_64':   {'signature': sys.argv[4], 'url': sys.argv[5]}
            }
          }
          json.dump(data, open('latest.json','w'), indent=2)
          " "$VERSION" "$NOTES_URL" "$DATE" "$SIGNATURE" "$DOWNLOAD_URL"

          gh release upload "$TAG" latest.json --clobber

      # tauri-action creates the release as a draft (releaseDraft: true
      # above) so we can sanity-check assets before it's visible. Now that
      # all required assets are uploaded (both DMGs, tar.gz, .sig,
      # latest.json), publish it — otherwise /releases/latest keeps
      # pointing at the previous version and the versionless aliases 404.
      #
      # Before this step existed, v0.1.2 had to be published by hand with
      # `gh release edit v0.1.2 --draft=false` — don't repeat that.
      - name: Publish draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          ASSETS=$(gh release view "$TAG" --json assets -q '.assets[].name')
          for REQUIRED in ".dmg" ".tar.gz" ".tar.gz.sig" "latest.json" "HQ-Sync_universal.dmg"; do
            if ! echo "$ASSETS" | grep -q "$REQUIRED"; then
              echo "::error::Missing required asset matching: $REQUIRED"
              exit 1
            fi
          done
          gh release edit "$TAG" --draft=false
